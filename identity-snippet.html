<!--
  ════════════════════════════════════════════════════════
  NETLIFY IDENTITY SNIPPET
  Paste both blocks into EVERY root HTML page:
    index.html, about.html, tour.html, media.html, booking.html

  Block 1 → in <head>, before </head>
  Block 2 → in <body>, before </body>
  ════════════════════════════════════════════════════════
-->

<!-- BLOCK 1: paste in <head> -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<!-- BLOCK 2: paste before </body> -->
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on('init', function (user) {
      if (!user) {
        window.netlifyIdentity.on('login', function () {
          document.location.href = '/admin/';
        });
      }
    });
  }
</script>
