backend:
  name: git-gateway
  branch: main

media_folder: images/uploads
public_folder: images/uploads

site_url: https://winsloweaglestribute.com
display_url: https://winsloweaglestribute.com

collections:

  - name: content
    label: Site Content
    files:

      # ─── TOUR DATES ──────────────────────────────────────────────────────────
      - name: tour
        label: Tour Dates
        file: _content/tour.json
        fields:
          - label: Shows
            name: shows
            widget: list
            summary: "{{fields.date}} — {{fields.venue}}"
            fields:
              - { label: Venue Name, name: venue, widget: string }
              - { label: City / State, name: location, widget: string }
              - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "MM/DD/YYYY", time_format: false }
              - { label: Show Time, name: time, widget: string, required: false, hint: "e.g. 8:00 PM" }
              - { label: Ticket / Event URL, name: url, widget: string, required: false }
              - { label: Notes, name: notes, widget: string, required: false, hint: "e.g. Free Admission · 21+" }
              - { label: "Featured on Homepage", name: featured, widget: boolean, default: false }

      # ─── VIDEOS ──────────────────────────────────────────────────────────────
      - name: media
        label: Videos
        file: _content/media.json
        fields:
          - label: Videos
            name: videos
            widget: list
            summary: "#{{fields.order}} — {{fields.title}}"
            fields:
              - { label: Title, name: title, widget: string }
              - { label: YouTube Video ID, name: youtube_id, widget: string, hint: "Just the ID after watch?v= e.g. dQw4w9WgXcQ" }
              - { label: Description, name: description, widget: text, required: false }
              - { label: Display Order, name: order, widget: number, default: 1, value_type: int }

      # ─── TESTIMONIALS ─────────────────────────────────────────────────────────
      - name: testimonials
        label: Testimonials
        file: _content/testimonials.json
        fields:
          - label: Testimonials
            name: testimonials
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: Quote, name: quote, widget: text }
              - { label: Name, name: name, widget: string }
              - { label: Title / Role, name: title, widget: string, required: false }
              - { label: "Featured on Homepage", name: featured, widget: boolean, default: false }

      # ─── GALLERY ──────────────────────────────────────────────────────────────
      - name: gallery
        label: Photo Gallery
        file: _content/gallery.json
        fields:
          - label: Photos
            name: photos
            widget: list
            summary: "{{fields.alt}}"
            fields:
              - { label: Image, name: image, widget: image }
              - { label: Caption, name: caption, widget: string, required: false }
              - { label: Alt Text, name: alt, widget: string }

      # ─── BAND MEMBERS ─────────────────────────────────────────────────────────
      - name: band
        label: Band Members
        file: _content/band.json
        fields:
          - label: Members
            name: members
            widget: list
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Role / Instrument, name: role, widget: string }
              - { label: Photo, name: photo, widget: image }
              - { label: Bio, name: bio, widget: text }

      # ─── GLOBAL SETTINGS ──────────────────────────────────────────────────────
      - name: settings
        label: Global Settings
        file: _content/settings.json
        fields:
          - { label: Booking Email, name: booking_email, widget: string }
          - { label: Phone Number, name: phone, widget: string }
          - { label: Booking Contact Name, name: booking_contact, widget: string, required: false }
          - { label: Facebook URL, name: facebook, widget: string, required: false }
          - { label: Instagram URL, name: instagram, widget: string, required: false }
          - { label: YouTube Channel URL, name: youtube, widget: string, required: false }
