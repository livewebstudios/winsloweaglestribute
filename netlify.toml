[build]
  publish = "."

# ─── Security headers for /admin ─────────────────────────────────────────────
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

# ─── Redirect /admin → /admin/ (trailing slash) ───────────────────────────────
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200
